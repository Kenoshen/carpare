{{define "content"}}
<hgroup>
  <h2>Edit Listing</h2>
  <p>{{.Label}}</p>
</hgroup>

<form method="post" action="/listings/{{.ID}}">
  <div class="grid">
    <select name="model_year_id" required>
      {{range .ModelYears}}<option value="{{.ID}}" {{if eq .ID $.ModelYearID}}selected{{end}}>{{.Label}}</option>{{end}}
    </select>
    <input type="text" name="trim" placeholder="Trim" value="{{.Trim}}">
    <input type="number" step="0.01" name="price" placeholder="Price" value="{{.Price}}" required>
    <input type="number" name="mileage" placeholder="Mileage" value="{{.Mileage}}" required>
  </div>
  <div class="grid">
    <select name="condition">
      <option value="used" {{if eq .Condition "used"}}selected{{end}}>Used</option>
      <option value="new" {{if eq .Condition "new"}}selected{{end}}>New</option>
      <option value="certified_pre_owned" {{if eq .Condition "certified_pre_owned"}}selected{{end}}>Certified Pre-Owned</option>
    </select>
    <input type="text" name="exterior_color" placeholder="Exterior Color" value="{{.ExteriorColor}}">
    <input type="text" name="interior_color" placeholder="Interior Color" value="{{.InteriorColor}}">
    <input type="text" name="vin" placeholder="VIN" value="{{.VIN}}">
  </div>
  <div class="grid">
    <input type="text" name="location" placeholder="Location" value="{{.Location}}">
    <input type="text" name="seller_name" placeholder="Seller" value="{{.SellerName}}">
    <select name="seller_type">
      <option value="dealer" {{if eq .SellerType "dealer"}}selected{{end}}>Dealer</option>
      <option value="private" {{if eq .SellerType "private"}}selected{{end}}>Private</option>
    </select>
    <select name="status">
      <option value="considering" {{if eq .Status "considering"}}selected{{end}}>Considering</option>
      <option value="contacted" {{if eq .Status "contacted"}}selected{{end}}>Contacted</option>
      <option value="test_driven" {{if eq .Status "test_driven"}}selected{{end}}>Test Driven</option>
      <option value="rejected" {{if eq .Status "rejected"}}selected{{end}}>Rejected</option>
      <option value="purchased" {{if eq .Status "purchased"}}selected{{end}}>Purchased</option>
    </select>
  </div>
  <input type="url" name="listing_url" placeholder="Listing URL" value="{{.ListingURL}}">
  <label>Pros (one per line)<textarea name="pros" rows="3">{{.ProsText}}</textarea></label>
  <label>Cons (one per line)<textarea name="cons" rows="3">{{.ConsText}}</textarea></label>
  <label>Notes<textarea name="notes" rows="3">{{.Notes}}</textarea></label>
  <button type="submit">Save</button>
  <a href="/listings" role="button" class="secondary outline">Cancel</a>
</form>
{{end}}
