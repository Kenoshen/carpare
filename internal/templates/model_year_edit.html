{{define "content"}}
<hgroup>
  <h2>Edit Model Year</h2>
  <p>{{.Label}}</p>
</hgroup>

<form method="post" action="/model-years/{{.ID}}">
  <div class="grid">
    <select name="car_model_id" required>
      {{range .CarModels}}<option value="{{.ID}}" {{if eq .ID $.CarModelID}}selected{{end}}>{{.Make}} {{.Model}}</option>{{end}}
    </select>
    <input type="number" name="year" value="{{.Year}}" required>
    <select name="fuel_type">
      <option value="gas" {{if eq .FuelType "gas"}}selected{{end}}>Gas</option>
      <option value="hybrid" {{if eq .FuelType "hybrid"}}selected{{end}}>Hybrid</option>
      <option value="phev" {{if eq .FuelType "phev"}}selected{{end}}>Plug-in Hybrid</option>
      <option value="electric" {{if eq .FuelType "electric"}}selected{{end}}>Electric</option>
      <option value="diesel" {{if eq .FuelType "diesel"}}selected{{end}}>Diesel</option>
    </select>
    <select name="drive_type">
      <option value="fwd" {{if eq .DriveType "fwd"}}selected{{end}}>FWD</option>
      <option value="awd" {{if eq .DriveType "awd"}}selected{{end}}>AWD</option>
      <option value="rwd" {{if eq .DriveType "rwd"}}selected{{end}}>RWD</option>
      <option value="4wd" {{if eq .DriveType "4wd"}}selected{{end}}>4WD</option>
    </select>
  </div>
  <div class="grid">
    <input type="number" step="0.1" name="average_mpg" placeholder="Average MPG" value="{{.AverageMPG}}">
    <input type="number" name="seating_capacity" placeholder="Seats" value="{{.SeatingCapacity}}">
    <select name="rating">
      <option value="1" {{if eq .Rating 1}}selected{{end}}>1</option>
      <option value="2" {{if eq .Rating 2}}selected{{end}}>2</option>
      <option value="3" {{if eq .Rating 3}}selected{{end}}>3</option>
      <option value="4" {{if eq .Rating 4}}selected{{end}}>4</option>
      <option value="5" {{if eq .Rating 5}}selected{{end}}>5</option>
    </select>
  </div>
  <div class="grid">
    <input type="number" step="0.01" name="min_price" placeholder="Min Price" value="{{.MinPrice}}">
    <input type="number" step="0.01" name="max_price" placeholder="Max Price" value="{{.MaxPrice}}">
  </div>
  <div class="grid">
    <input type="number" name="engine_cylinders" placeholder="Engine Cylinders" value="{{.EngineCylinders}}">
    <input type="number" step="0.1" name="engine_liters" placeholder="Engine Liters" value="{{.EngineLiters}}">
  </div>
  <input type="url" name="image_url" placeholder="Image URL" value="{{.ImageURL}}">
  {{if .ImageURL}}<img src="{{.ImageURL}}" alt="{{.Label}}" class="thumb-preview">{{end}}
  <textarea name="notes" placeholder="Notes" rows="3">{{.Notes}}</textarea>
  <button type="submit">Save</button>
  <a href="/model-years" role="button" class="secondary outline">Cancel</a>
</form>
{{end}}
